name: Update docs

# Disabled — restore pull_request trigger to re-enable.
on:
  workflow_dispatch:

env:
  DOCS_PR_BRANCH: chore/bot-regenerate-cli-docs

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-docs-main
  cancel-in-progress: false

jobs:
  generate-docs-pr:
    if: false # Disabled — remove this line to re-enable.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25

      - name: Generate markdown documentation
        run: make docs

      - name: Open or update pull request for doc changes
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: |
            docs
          commit-message: "chore: regenerate CLI documentation"
          branch: ${{ env.DOCS_PR_BRANCH }}
          base: main
          delete-branch: true
          title: "chore: regenerate CLI documentation"
          body: |
            Regenerated Cobra command markdown in `docs/` after a merge to `main`.

            Merge this when you want the public docs in sync, or close if the changes are already included elsewhere.
          draft: false
